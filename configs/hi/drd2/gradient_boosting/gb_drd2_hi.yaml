experiment:
  name: gb_drd2_hi
  task: hi
  dataset: drd2

fingerprint:
  types: [maccs]

model:
  name: gb
  fixed:
    random_state: 42
  search:
    n_estimators: [100, 200, 300, 500]
    learning_rate: [0.01, 0.05, 0.1, 0.2]
    max_depth: [3, 4, 5, 6]
    min_samples_split: [2, 5, 10]
    min_samples_leaf: [1, 2, 4]
    subsample: [0.7, 0.8, 1.0]

cv:
  inner_k: 2
  scoring: average_precision
  search_strategy: random
  n_iter: 80
  random_state: 42
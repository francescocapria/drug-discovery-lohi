experiment:
  name: svm_linear_drd2_hi_inner_ood_holdout
  task: hi
  dataset: drd2
fingerprint:
  types:
  - ecfp4
model:
  name: svm
  fixed:
    kernel: linear
    probability: false
  search:
    C:
    - 0.0001
    - 0.0005
    - 0.001
    - 0.002
    - 0.005
    - 0.01
    - 0.05
    - 0.1
    - 0.25
    - 0.5
    - 1.0
    - 2.0
    - 5.0
    - 10.0
    - 25.0
    - 50.0
    - 100.0
    class_weight:
    - null
    - balanced
cv:
  inner_k: 2
  scoring: average_precision
  search_strategy: grid
  random_state: 42
  holdout_val_fraction: 0.2
  inner_split_strategy: holdout
artifacts:
  save_model: true
  save_complexity: true
  save_feature_importance: true
  save_cv_results: true

experiment:
  name: svm_ecfp4_drd2_hi
  task: hi
  dataset: drd2

fingerprint:
  type: ecfp4

model:
  name: svm
  fixed:
    probability: true
    class_weight: balanced
    random_state: 42
  search:
    - kernel: [linear]
      C: [0.001, 0.01, 0.1, 1, 10, 100, 1000]
    - kernel: [rbf]
      C: [0.01, 0.1, 1, 10, 100, 1000]
      gamma: [scale, auto, 0.0001, 0.001, 0.01, 0.1, 1]

cv:
  inner_k: 3
  scoring: average_precision
  search_strategy: grid
  n_iter: 50
  random_state: 42
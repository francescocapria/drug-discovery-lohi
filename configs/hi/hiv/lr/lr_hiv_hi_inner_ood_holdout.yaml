experiment:
  name: lr_maccs_hiv_hi
  task: hi
  dataset: hiv
fingerprint:
  types:
  - ecfp4
  - maccs
  - rdkit_desc
model:
  name: lr
  fixed:
    max_iter: 50000
    random_state: 42
    solver: saga
    penalty: elasticnet
  search:
    C: [0.01, 0.1, 1.0, 5.0, 10.0]
    l1_ratio: [0.0, 0.5, 1.0]
    class_weight: [null, balanced]
cv:
  inner_k: 2
  scoring: average_precision
  search_strategy: grid
  random_state: 42
  inner_split_strategy: holdout
  holdout_val_fraction: 0.2

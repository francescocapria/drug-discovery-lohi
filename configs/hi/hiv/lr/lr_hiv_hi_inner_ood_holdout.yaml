experiment:
  name: lr_hiv_hi_inner_ood_holdout
  task: hi
  dataset: hiv

fingerprint:
  types:
    - ecfp4
    - maccs
    - rdkit_desc

model:
  name: lr
  fixed:
    max_iter: 8000
    tol: 0.002
    random_state: 42
    solver: saga
  search:
    C: [0.01, 0.1, 1.0]
    l1_ratio: [0.0, 1.0]
    class_weight: [null, balanced]

cv:
  inner_k: 2
  scoring: average_precision
  search_strategy: grid
  random_state: 42
  inner_split_strategy: holdout
  holdout_val_fraction: 0.2

artifacts:
  save_model: true
  save_complexity: true
  save_feature_importance: true
  save_cv_results: true
experiment:
  name: lr_hiv_hi_random_shuffle
  task: hi
  dataset: hiv
fingerprint:
  types:
  - ecfp4
model:
  name: lr
  fixed:
    max_iter: 60000
    tol: 0.001
    random_state: 42
    solver: saga
    penalty: elasticnet
  search:
    C:
    - 0.01
    - 0.05
    - 0.1
    - 0.25
    - 0.5
    - 1.0
    - 5.0
    l1_ratio:
    - 0.0
    - 0.25
    - 0.5
    - 0.9
    - 1.0
    class_weight:
    - null
    - balanced
cv:
  inner_k: 2
  scoring: average_precision
  search_strategy: grid
  random_state: 42
  holdout_val_fraction: 0.2
  inner_split_strategy: random_shuffle
artifacts:
  save_model: true
  save_complexity: true
  save_feature_importance: true
  save_cv_results: true

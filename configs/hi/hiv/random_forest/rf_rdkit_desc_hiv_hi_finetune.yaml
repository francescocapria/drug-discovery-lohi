experiment:
  name: rf_rdkit_desc_hiv_hi_ft
  task: hi
  dataset: hiv
 
fingerprint:
  types: [rdkit_desc]
 
model:
  name: rf
  fixed:
    random_state: 42
    class_weight: balanced
  search:
    n_estimators: [200, 300, 500, 800]
    max_depth: [5, 8, 10, 15, 20]
    min_samples_split: [10, 20, 50, 100]
    min_samples_leaf: [8, 16, 32, 64]
    max_features: [0.05, 0.1, 0.2, sqrt]
 
cv:
  inner_k: 3
  scoring: average_precision
  search_strategy: random
  n_iter: 50
  random_state: 42
experiment:
  name: svm_tanimoto_hiv_hi
  task: hi
  dataset: hiv

fingerprint:
  types:
    - ecfp4

model:
  name: svm
  fixed:
    kernel: tanimoto
    probability: false
  search:
    C: [0.1, 1.0]
    class_weight: [null, balanced]

cv:
  inner_k: 2
  scoring: average_precision
  search_strategy: grid
  random_state: 42

artifacts:
  save_model: true
  save_complexity: true
  save_feature_importance: false
  save_cv_results: true
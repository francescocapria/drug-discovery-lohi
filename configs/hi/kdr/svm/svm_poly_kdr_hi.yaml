experiment:
  name: svm_poly_kdr_hi
  task: hi
  dataset: kdr

fingerprint:
  types: [ecfp4, maccs, rdkit_desc]

model:
  name: svm
  fixed:
    kernel: poly
    probability: true
  search:
    C: [0.1, 1.0, 5.0, 10.0]
    degree: [2, 3]
    coef0: [0.0, 1.0]
    gamma: [scale, auto]
    class_weight: [null, balanced] 

cv:
  inner_k: 2
  scoring: average_precision
  search_strategy: grid
  random_state: 42
experiment:
  name: svm_rbf_kdr_hi
  task: hi
  dataset: kdr

fingerprint:
  types: [ecfp4, maccs, rdkit_desc]

model:
  name: svm
  fixed:
    kernel: rbf
    probability: true
  search:
    C: [0.1, 0.5, 1.0, 2.0, 5.0, 10.0]
    gamma: [scale, auto, 0.001, 0.01]
    class_weight: [null, balanced]

cv:
  inner_k: 2
  scoring: average_precision
  search_strategy: grid
  random_state: 42
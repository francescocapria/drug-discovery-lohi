experiment:
  name: dt_sol_hi_random_shuffle
  task: hi
  dataset: sol
fingerprint:
  types:
  - ecfp4
  - maccs
model:
  name: dt
  fixed:
    random_state: 42
  search:
    max_depth:
    - 3
    - 5
    - 7
    - 10
    - 15
    - 20
    min_samples_split:
    - 2
    - 5
    - 10
    - 20
    min_samples_leaf:
    - 1
    - 2
    - 5
    - 10
    criterion:
    - gini
    - entropy
    class_weight:
    - null
    - balanced
    max_features:
    - sqrt
    - log2
    - null
    ccp_alpha:
    - 0.0
    - 0.0001
    - 0.001
    - 0.01
cv:
  inner_k: 2
  scoring: average_precision
  search_strategy: grid
  random_state: 42
  inner_split_strategy: random_shuffle
  holdout_val_fraction: 0.2

artifacts:
  save_model: true
  save_complexity: true
  save_feature_importance: true
  save_cv_results: true
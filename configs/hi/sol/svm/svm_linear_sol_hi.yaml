experiment:
  name: svm_linear_sol_hi
  task: hi
  dataset: sol

fingerprint:
  types: [ecfp4, maccs]

model:
  name: svm
  fixed:
    kernel: linear
    probability: true
  search:
    C: [0.1, 0.5, 1.0, 2.0, 5.0, 10.0]
    class_weight: [null, balanced]

cv:
  inner_k: 2
  scoring: average_precision
  search_strategy: grid
  random_state: 42
experiment:
  name: xgb_sol_hi
  task: hi
  dataset: sol

fingerprint:
  types: [ecfp4, maccs, rdkit_desc]

model:
  name: xgb
  fixed:
    random_state: 42
    n_jobs: -1
  search:
    n_estimators: [100, 200, 300]
    learning_rate: [0.05, 0.1, 0.2]
    max_depth: [3, 4, 6]
    subsample: [0.8, 1.0]
    colsample_bytree: [0.8, 1.0]

cv:
  inner_k: 2
  scoring: average_precision
  search_strategy: random
  n_iter: 60
  random_state: 42
experiment:
  name: knn_ecfp4_drd2_hi
  task: hi
  dataset: drd2

fingerprint:
  type: ecfp4

model:
  name: knn
  fixed:
    metric: jaccard
  search:
    n_neighbors: [1, 3, 5, 7, 10, 15, 20, 30]
    weights: [uniform, distance]

cv:
  inner_k: 3
  scoring: average_precision
  search_strategy: grid
  random_state: 42
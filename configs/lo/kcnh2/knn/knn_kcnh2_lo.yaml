experiment:
  name: knn_ecfp4_kcnh2_lo
  task: lo
  dataset: kcnh2

fingerprint:
  types: [ecfp4, maccs]

model:
  name: knn
  fixed:
    algorithm: auto
  search:
    n_neighbors: [3, 5, 7, 11, 15, 21, 31, 51, 75, 101]
    metric: [euclidean, minkowski]
    weights: [uniform, distance]

cv:
  inner_k: 2
  scoring: neg_mean_squared_error
  search_strategy: grid
  random_state: 42
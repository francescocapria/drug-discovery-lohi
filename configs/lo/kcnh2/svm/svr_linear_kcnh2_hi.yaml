experiment:
  name: svr_linear_kcnh2_lo
  task: lo
  dataset: kcnh2

fingerprint:
  types: [ecfp4, maccs]

model:
  name: svm
  fixed:
    kernel: linear
  search:
    C: [0.001, 0.01, 0.1, 0.5, 1.0, 2.0, 5.0, 10.0, 50.0, 100.0]
    epsilon: [0.01, 0.05, 0.1, 0.2, 0.5]

cv:
  inner_k: 2
  scoring: neg_mean_absolute_error
  search_strategy: grid
  random_state: 42
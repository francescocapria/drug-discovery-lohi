experiment:
  name: svr_poly_kcnh2_lo
  task: lo
  dataset: kcnh2

fingerprint:
  types: [ecfp4, maccs, rdkit_desc]

model:
  name: svm
  fixed:
    kernel: poly
  search:
    C: [0.01, 0.1, 0.5, 1.0, 2.0, 5.0, 10.0, 50.0]
    degree: [2, 3, 4, 5]
    coef0: [0.0, 0.1, 0.5, 1.0]
    gamma: [scale, auto]
    epsilon: [0.01, 0.05, 0.1, 0.2]

cv:
  inner_k: 2
  scoring: neg_mean_absolute_error
  search_strategy: grid
  random_state: 42
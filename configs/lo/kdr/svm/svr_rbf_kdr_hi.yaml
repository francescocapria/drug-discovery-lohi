experiment:
  name: svr_rbf_kdr_lo
  task: lo
  dataset: kdr

fingerprint:
  types: [ecfp4, maccs, rdkit_desc]

model:
  name: svm
  fixed:
    kernel: rbf
  search:
    C: [0.01, 0.1, 0.5, 1.0, 2.0, 5.0, 10.0, 50.0, 100.0]
    gamma: [scale, auto, 0.0001, 0.001, 0.01, 0.1]
    epsilon: [0.01, 0.05, 0.1, 0.2]

cv:
  inner_k: 2
  scoring: neg_mean_absolute_error
  search_strategy: grid
  random_state: 42